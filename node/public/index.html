<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  </head>
  <body>
    <div id="login-page" class="">
      <div id="join-card">
        <h2>CREATE OR JOIN ROOM:</h2>
        <div class="otp-container">
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            autocomplete="one-time-code"
            pattern="\d{1}"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            pattern="\d{1}"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            pattern="\d{1}"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            pattern="\d{1}"
          />
        </div>
        <div id="joinButtons">
          <button id="createBtn">
            <span class="material-icons md-36">add</span>CREATE ROOM
          </button>
          <button id="joinBtn">
            <span class="material-icons md-36">meeting_room</span>JOIN ROOM
          </button>
        </div>
      </div>
    </div>
    <div id="game-page" class="hidden">
      <div id="gameContainer">
        <div id="boardContainer" class="main-content">
          <div id="board">
            <div class="square white" data-pos="a8"></div>

            <div class="square white" data-pos="f5"></div>
            <div class="square black" data-pos="g5"></div>
            <div class="square white" data-pos="h5"></div>
            <div class="square white" data-pos="a4"></div>

          </div>
        </div>
        <div id="boardButtons">
          <button id="resignBtn">
            <span class="material-icons md-36"> flag </span>RESIGN
          </button>
          <button id="drawBtn">
            <span class="material-icons md-36">handshake</span>DRAW
          </button>
          <button id="resetBtn">
            <span class="material-icons md-36">autorenew</span>RESET
          </button>
        </div>
      </div>
      <div class="tableContainer">
        <h2>MOVE HISTORY</h2>
        <div class="moveTableContainer scroll-box">
          <table id="move-table">
            <tbody>
              <tr>
                <td>1</td>
                <td>...</td>
                <td>...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <h2>ROOM CODE</h2>
        <p id="roomCode">X X X X</p>
      </div>
    </div>
    <dialog id="resignConfirmation">
      <h2>ARE YOU SURE?</h2>
      <div id="dialogButtons">
        <button id="cancelResign">CANCEL</button>
        <button id="resignConfirmed">RESIGN</button>
      </div>
    </dialog>
    <dialog id="errorModal">
      <h2 id="errorMessage"></h2>
      <button id="dismissError">DISMISS</button>
    </dialog>
    <dialog id="drawConfirmation"></dialog>
    <script src="./js/index.js" type="module"></script>
  </body>
</html>
