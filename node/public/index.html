<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  </head>
  <body>
    <div id="login-page" class="">
      <div id="join-card">
        <h2>CREATE OR JOIN ROOM:</h2>
        <div class="otp-container">
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            autocomplete="one-time-code"
            pattern="\d{1}"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            pattern="\d{1}"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            pattern="\d{1}"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            pattern="\d{1}"
          />
        </div>
        <div id="joinButtons">
          <button id="createBtn">
            <span class="material-icons">add</span>CREATE ROOM
          </button>
          <button id="joinBtn">
            <span class="material-icons">meeting_room</span>JOIN ROOM
          </button>
        </div>
      </div>
    </div>
    <div id="game-page" class="hidden">
      <div id="gameContainer">
        <div id="boardContainer" class="main-content">
          <div id="board">
            <div class="square white" data-pos="a8"></div>
            <div class="square black" data-pos="b8"></div>
            <div class="square white" data-pos="c8"></div>
            <div class="square black" data-pos="d8"></div>
            <div class="square white" data-pos="e8"></div>
            <div class="square black" data-pos="f8"></div>
            <div class="square white" data-pos="g8"></div>
            <div class="square black" data-pos="h8"></div>
            <div class="square black" data-pos="a7"></div>
            <div class="square white" data-pos="b7"></div>
            <div class="square black" data-pos="c7"></div>
            <div class="square white" data-pos="d7"></div>
            <div class="square black" data-pos="e7"></div>
            <div class="square white" data-pos="f7"></div>
            <div class="square black" data-pos="g7"></div>
            <div class="square white" data-pos="h7"></div>
            <div class="square white" data-pos="a6"></div>
            <div class="square black" data-pos="b6"></div>
            <div class="square white" data-pos="c6"></div>
            <div class="square black" data-pos="d6"></div>
            <div class="square white" data-pos="e6"></div>
            <div class="square black" data-pos="f6"></div>
            <div class="square white" data-pos="g6"></div>
            <div class="square black" data-pos="h6"></div>
            <div class="square black" data-pos="a5"></div>
            <div class="square white" data-pos="b5"></div>
            <div class="square black" data-pos="c5"></div>
            <div class="square white" data-pos="d5"></div>
            <div class="square black" data-pos="e5"></div>
            <div class="square white" data-pos="f5"></div>
            <div class="square black" data-pos="g5"></div>
            <div class="square white" data-pos="h5"></div>
            <div class="square white" data-pos="a4"></div>
            <div class="square black" data-pos="b4"></div>
            <div class="square white" data-pos="c4"></div>
            <div class="square black" data-pos="d4"></div>
            <div class="square white" data-pos="e4"></div>
            <div class="square black" data-pos="f4"></div>
            <div class="square white" data-pos="g4"></div>
            <div class="square black" data-pos="h4"></div>
            <div class="square black" data-pos="a3"></div>
            <div class="square white" data-pos="b3"></div>
            <div class="square black" data-pos="c3"></div>
            <div class="square white" data-pos="d3"></div>
            <div class="square black" data-pos="e3"></div>
            <div class="square white" data-pos="f3"></div>
            <div class="square black" data-pos="g3"></div>
            <div class="square white" data-pos="h3"></div>
            <div class="square white" data-pos="a2"></div>
            <div class="square black" data-pos="b2"></div>
            <div class="square white" data-pos="c2"></div>
            <div class="square black" data-pos="d2"></div>
            <div class="square white" data-pos="e2"></div>
            <div class="square black" data-pos="f2"></div>
            <div class="square white" data-pos="g2"></div>
            <div class="square black" data-pos="h2"></div>
            <div class="square black" data-pos="a1"></div>
            <div class="square white" data-pos="b1"></div>
            <div class="square black" data-pos="c1"></div>
            <div class="square white" data-pos="d1"></div>
            <div class="square black" data-pos="e1"></div>
            <div class="square white" data-pos="f1"></div>
            <div class="square black" data-pos="g1"></div>
            <div class="square white" data-pos="h1"></div>
          </div>
        </div>
        <div id="boardButtons">
          <button id="resignBtn">
            <span class="material-icons"> flag </span>RESIGN
          </button>
          <button id="drawBtn">
            <span class="material-icons">handshake</span>DRAW
          </button>
          <button id="resetBtn" class="hidden">
            <span class="material-icons">autorenew</span>RESET
          </button>
        </div>
      </div>
      <div class="tableContainer">
        <div id="chat" class="hidden"></div>
        <div id="info" class="">
          <h2>MOVE HISTORY</h2>
          <div class="moveTableContainer scroll-box">
            <table id="move-table">
              <tbody>
                <tr>
                  <td>1</td>
                  <td>...</td>
                  <td>...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <h2>ROOM CODE</h2>
          <p id="roomCode">X X X X</p>
        </div>

        <div id="small-nav">
          <hr />
          <div>
            <button>
              <span class="material-icons md-36 active">info</span>
            </button>
            <button>
              <span class="material-icons-outlined md-36">chat</span>
            </button>
            <!-- <button><span class="material-icons md-36">info</span></button> -->
          </div>
        </div>
      </div>
    </div>
    <dialog id="resignConfirmation">
      <h2>ARE YOU SURE?</h2>
      <div id="dialogButtons">
        <button id="cancelResign">CANCEL</button>
        <button id="resignConfirmed">RESIGN</button>
      </div>
    </dialog>
    <dialog id="errorModal">
      <h2 id="errorMessage"></h2>
      <button id="dismissError">DISMISS</button>
    </dialog>
    <dialog id="drawConfirmation"></dialog>
    <dialog id="gameOver">
      <div id="gameOverContainer">
        <div id="gameOverMessage" class="">
          <p class="neon-text">MATCH RESULT</p>
          <h1 id="winCondition" class="neon-text">CHECKMATE</h1>
          <div id="seperator" class=""></div>
        </div>
        <div id="gameSummary">
          <div id="recap"></div>
          <div id="actions">
            <button id="rematchBtn" class="win">
              <span class="material-icons md-36">autorenew</span>REMATCH
            </button>
            <button>
              <span class="material-icons-outlined md-36">analytics</span
              >ANALYZE GAME
            </button>
            <button>
              <span class="material-icons md-36">search</span>FIND NEW OPPONENT
            </button>
            <div id="stats">
              <table>
                <tbody>
                  <tr>
                    <td>GAME TYPE</td>
                    <td>CASUAL MATCH</td>
                  </tr>
                  <tr>
                    <td>DURATION</td>
                    <td>12M 34S</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <button id="backButton">
          <span class="material-icons">keyboard_double_arrow_left</span>BACK TO
          ROOMS
        </button>
      </div>
    </dialog>
    <script src="./js/index.js" type="module"></script>
  </body>
</html>
